<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌸</title>
    <!-- Cute flower icon for the browser tab -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2926/2926754.png" type="image/png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffdae0; /* Baby Pink */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'serif';
            cursor: pointer;
        }

        #start-screen {
            text-align: center;
            transition: opacity 0.8s ease;
        }

        #start-screen p {
            font-style: italic;
            font-size: 1.8rem;
            color: #d63384;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .container {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Flower Styling */
        svg {
            width: 280px;
            height: 280px;
        }

        .outline {
            fill: transparent;
            stroke: #c9184a;
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: fill 2s ease-in-out 2.5s; /* Delay fill until drawing finishes */
        }

        .leaf-outline {
            fill: transparent;
            stroke: #2d6a4f;
            stroke-width: 2;
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            transition: fill 2s ease-in-out 2.5s;
        }

        /* Animation class added via JS */
        .draw {
            animation: drawPath 3s forwards ease-in-out;
        }

        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }

        /* Final colors after drawing */
        .filled-flower { fill: #ff4d6d !important; }
        .filled-leaf { fill: #52b788 !important; }
        .filled-center { fill: #ffb703 !important; }

        #message {
            margin-top: 30px;
            font-style: italic;
            font-size: 3rem;
            color: #c9184a;
            opacity: 0;
            transform: translateY(10px);
            transition: all 2s ease-in-out;
        }

        .show-text {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>
<body onclick="bloom()">

    <div id="start-screen">
        <p>click anywhere 🎀 ✨</p>
    </div>

    <div class="container" id="flower-box">
        <svg viewBox="0 0 100 100">
            <!-- Stem -->
            <path class="leaf-outline" d="M50,95 Q50,70 50,45" />
            <!-- Leaves -->
            <path class="leaf-outline leaf-fill" d="M50,80 Q30,75 25,60 Q40,65 50,80" />
            <path class="leaf-outline leaf-fill" d="M50,75 Q70,70 75,55 Q60,60 50,75" />
            
            <!-- Petals (The "Full" Flower) -->
            <circle class="outline flower-fill" cx="50" cy="30" r="12" />
            <circle class="outline flower-fill" cx="65" cy="40" r="12" />
            <circle class="outline flower-fill" cx="35" cy="40" r="12" />
            <circle class="outline flower-fill" cx="40" cy="55" r="12" />
            <circle class="outline flower-fill" cx="60" cy="55" r="12" />
            
            <!-- Flower Center -->
            <circle class="outline center-fill" cx="50" cy="45" r="6" />
        </svg>

        <div id="message">good morninggggh!!!</div>
    </div>

    <script>
        function bloom() {
            // Hide start text
            document.getElementById('start-screen').style.display = 'none';
            
            // Show flower area
            const box = document.getElementById('flower-box');
            box.style.display = 'flex';

            // Start drawing outlines
            const paths = document.querySelectorAll('.outline, .leaf-outline');
            paths.forEach(p => p.classList.add('draw'));

            // After 2.5 seconds, fill with color and show text
            setTimeout(() => {
                document.querySelectorAll('.flower-fill').forEach(f => f.classList.add('filled-flower'));
                document.querySelectorAll('.leaf-fill').forEach(l => l.classList.add('filled-leaf'));
                document.querySelectorAll('.center-fill').forEach(c => c.classList.add('filled-center'));
                
                document.getElementById('message').classList.add('show-text');
            }, 2500);

            // Prevent repeat clicks
            document.body.onclick = null;
        }
    </script>
</body>
</html>
